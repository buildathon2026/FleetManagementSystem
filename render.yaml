services:
  # Frontend React application
  - type: web
    name: fleet-frontend
    runtime: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "node frontend/server.js"
    envVars:
      - key: VITE_API_URL
        value: "https://fleet-api.onrender.com"
      - key: NODE_ENV
        value: "production"
    routes:
      - path: "/"
        destination: "/"

  # Backend API cluster (all Python services combined)
  - type: web
    name: fleet-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    buildCommand: ""
    startCommand: "python start.py"
    envVars:
      - key: PORT
        value: "8001"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: LLM_API_KEY
        fromSecretFile: groq_api_key
      - key: LLM_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: PLANNER_MODEL
        value: "llama-3.1-8b-instant"
      - key: FORMATTER_MODEL
        value: "llama-3.1-8b-instant"
    healthCheckPath: "/health"
    autoDeploy: true

# Environment secrets (create these in Render dashboard)
# You'll need to set:
# - groq_api_key
